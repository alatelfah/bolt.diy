site_name: Hero Builder Docs
site_description: AI-powered development companion
site_author: StackBlitz Labs
site_url: https://hero-builder.com

# Repository
repo_name: hero-builder
repo_url: https://github.com/stackblitz-labs/hero-builder

# Social
social:
  - icon: fontawesome/brands/github
    link: https://github.com/stackblitz-labs/hero-builder
    name: hero-builder
  - icon: fontawesome/brands/discord
    link: https://discord.gg/hero-builder
    name: Hero Builder Discourse
  - icon: fontawesome/brands/x-twitter
    link: https://x.com/hero-builder
    name: Hero Builder on X
  - icon: fontawesome/brands/bluesky
    link: https://bsky.app/profile/hero-builder
    name: Hero Builder on Bluesky

edit_uri: ''

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stackblitz-labs/hero-builder
      name: hero-builder
    - icon: fontawesome/brands/discourse
      link: https://thinktank.ottomator.ai/
      name: Hero Builder Discourse
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/hero-builder
      name: Hero Builder on X
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/hero-builder
      name: Hero Builder on Bluesky

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - def_list
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
